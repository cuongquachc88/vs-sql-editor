name: Release

on:
  push:
    tags:
      - "release-v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Get version from tag
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: echo "VERSION=${TAG#release-v}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version from tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Package extension
        run: npm run package
        # vsce names the file out/vs-sql-editor-<version>.vsix automatically

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: out/vs-sql-editor-${{ steps.version.outputs.VERSION }}.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            npx vsce publish --packagePath "out/vs-sql-editor-${VERSION}.vsix"
          else
            echo "VSCE_PAT not set — skipping marketplace publish"
          fi
